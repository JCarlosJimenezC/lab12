<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard con WebComponents</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 40px;
            font-size: 32px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* Personalización de variables CSS para los componentes */
        user-card {
            --card-bg: #ffffff;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --button-bg: #667eea;
            --button-hover: #5568d3;
        }

        weather-time {
            --card-bg: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --card-shadow: 0 4px 15px rgba(245, 87, 108, 0.2);
        }

        user-dashboard {
            --dashboard-bg: #f5f7fa;
            --gap-size: 20px;
        }

        .dashboard-wrapper {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .example-section {
            margin-top: 60px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .example-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .example-section p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .code-block {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
            color: #333;
        }

        .customization-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .custom-item {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .custom-item h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .custom-item code {
            background: #fff;
            padding: 2px 6px;
            border-radius: 3px;
            color: #e83e8c;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Laboratorio #11: WebComponents de Dashboard Interactivo</h1>

        <div class="dashboard-wrapper">
            <user-dashboard>
                <user-card 
                    slot="user-card"
                    avatar="assets/images/perfil_profe-Alonso.png" 
                    name="Alonso" 
                    role="Profesor">
                </user-card>

                <weather-time 
                    slot="weather"
                    location="Liberia" 
                    temperature="31" 
                    condition="Sunny">
                </weather-time>

                <warning-badge 
                    slot="warning"
                    message="Sesión por expirar">
                </warning-badge>
            </user-dashboard>
        </div>

    

        <footer>
            <p>Laboratorio 11 - WebComponents con Shadow DOM</p>
        </footer>
    </div>

    <!-- Scripts de los componentes -->
    <script type="module" src="modules/user-card.js"></script>
    <script type="module" src="modules/weather-time.js"></script>
    <script type="module" src="modules/warning-badge.js"></script>
    <script type="module" src="modules/user-dashboard.js"></script>
    
    <!-- Script principal -->
    <script type="module" src="index.js"></script>
</body>
</html>
